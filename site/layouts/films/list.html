{{ define "main" }}
  <div class="row row-cols-1 row-cols-md-3 g-4 justify-content-center">
    {{- range .Pages }}
    <div class="col">
      <div class="position-relative overflow-hidden rounded-3 border-0 bg-transparent" style="height: 300px;">
        
        <a href="{{ .RelPermalink }}" class="text-decoration-none">
          {{- $dirName := path.Base .File.Dir }}
          <img src="{{ printf "films/%s.jpg" $dirName | relURL }}" 
               class="w-100 h-100" 
               alt="{{ .Title }}" 
               style="object-fit: cover; display: block;">

          <div class="position-absolute bottom-0 start-0 w-100 p-3 text-center" 
               style="background: linear-gradient(transparent, rgba(0,0,0,0.8));">
            <h5 class="text-white fw-bold mb-0 text-uppercase" 
                style="font-family: 'Lexend Deca', sans-serif; letter-spacing: 1px;">
                {{ .Title }}
            </h5>
          </div>
        </a>
      </div>
    </div>
    {{- end }}
  </div>
</div>
{{ end }}
