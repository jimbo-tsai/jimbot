<div id="star-bg" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; background: #ffffff; overflow: hidden; pointer-events: none;">
    <canvas id="starCanvas" style="display: block;"></canvas>
</div>

<script>

(function() {
    const canvas = document.getElementById('starCanvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d', { alpha: false }); // Optimization: tells browser no transparency needed for bg

    let stars = [];
    let mouse = { x: -2000, y: -2000 };
    const mouseRadiusSq = 150 * 150; // Pre-calculate square for faster math
    let scrollY = window.scrollY;

    function lcg(seed) {
        let state = seed;
        return function() {
            state = (1103515245 * state + 12345) % 2147483648;
            return state / 2147483647;
        };
    }

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        initStars();
    }

    function initStars() {
        stars = [];
        const nextRandom = lcg(67);
        for (let i = 0; i < 120; i++) { // Dropped to 80 stars for performance
            stars.push({
                originX: nextRandom(),
                originY: nextRandom(),
                offsetX: 0,
                offsetY: 0,
                vx: 0,
                vy: 0,
                size: nextRandom() * 1.5 + 0.5,
                parallax: nextRandom() * 0.4 + 0.1,
                blinkOffset: nextRandom() * Math.PI * 2,
                colorPct: 0
            });
        }
    }

    window.addEventListener('resize', resize, { passive: true });
    window.addEventListener('mousemove', e => { 
        mouse.x = e.clientX; 
        mouse.y = e.clientY; 
    }, { passive: true });
    
    // Optimized scroll handling
    window.addEventListener('scroll', () => { 
        scrollY = window.pageYOffset; 
    }, { passive: true });

    resize();

    function animate(time) {
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const blinkFactor = (time / 8000) * (Math.PI * 2);

        for (let i = 0; i < stars.length; i++) {
            const s = stars[i];
            const baseX = s.originX * canvas.width;
            let baseY = (s.originY * canvas.height) - (scrollY * s.parallax);
            baseY = ((baseY % canvas.height) + canvas.height) % canvas.height;

            const curX = baseX + s.offsetX;
            const curY = baseY + s.offsetY;

            const dx = mouse.x - curX;
            const dy = mouse.y - curY;
            const distSq = dx * dx + dy * dy; // No Math.sqrt

            if (distSq < mouseRadiusSq) {
                s.colorPct = Math.min(1, s.colorPct + 0.08);
                const dist = Math.sqrt(distSq); // Only do sqrt if we are actually close
                const force = (150 - dist) / 150;
                s.vx -= (dx / dist) * force * 1.8;
                s.vy -= (dy / dist) * force * 1.8;
            } else {
                s.colorPct = Math.max(0, s.colorPct - 0.03);
            }

            s.offsetX = (s.offsetX + s.vx) * 0.9;
            s.offsetY = (s.offsetY + s.vy) * 0.9;
            s.vx *= 0.9;
            s.vy *= 0.9;

            const op = (Math.sin(blinkFactor + s.blinkOffset) + 1) / 2;
            
            ctx.beginPath();
            ctx.arc(curX, curY, s.size, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(${Math.floor(243 * s.colorPct)}, ${Math.floor(164 * s.colorPct)}, 0, ${op})`;
            ctx.fill();
        }

        requestAnimationFrame(animate);
    }
    requestAnimationFrame(animate);
})();
</script>
