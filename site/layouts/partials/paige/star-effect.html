<div id="star-bg" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; background: #ffffff; overflow: hidden; pointer-events: none;">
    <canvas id="starCanvas" style="display: block;"></canvas>
</div>

<script>
    (function() {
        const canvas = document.getElementById('starCanvas');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');

        let stars = [];
        let mouse = { x: -2000, y: -2000 };
        const mouseRadius = 150;
        let scrollY = window.scrollY;

        // The stable LCG Seed function
        function lcg(seed) {
            let state = seed;
            return function() {
                state = (1103515245 * state + 12345) % 2147483648;
                return state / 2147483647;
            };
        }

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initStars();
        }

        function initStars() {
            stars = [];
            const nextRandom = lcg(42); // Seed fixed at 42
            
            for (let i = 0; i < 120; i++) {
                stars.push({
                    originX: nextRandom(),
                    originY: nextRandom(),
                    offsetX: 0,
                    offsetY: 0,
                    vx: 0,
                    vy: 0,
                    size: nextRandom() * 1.8 + 0.5,
                    parallax: nextRandom() * 0.6 + 0.1,
                    blinkOffset: nextRandom() * Math.PI * 2,
                    colorPct: 0
                });
            }
        }

        window.addEventListener('resize', resize);
        window.addEventListener('mousemove', e => { 
            mouse.x = e.clientX; 
            mouse.y = e.clientY; 
        });
        window.addEventListener('scroll', () => { 
            scrollY = window.scrollY; 
        });

        resize();

        function animate(time) {
            // Background color
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const blinkFactor = (time / 8000) * (Math.PI * 2);

            stars.forEach(s => {
                const baseX = s.originX * canvas.width;
                let baseY = (s.originY * canvas.height) - (scrollY * s.parallax);
                baseY = ((baseY % canvas.height) + canvas.height) % canvas.height;

                const curX = baseX + s.offsetX;
                const curY = baseY + s.offsetY;

                const dx = mouse.x - curX;
                const dy = mouse.y - curY;
                const dist = Math.sqrt(dx * dx + dy * dy);

                // Interaction and Color Lerp
                if (dist < mouseRadius && dist > 0.1) {
                    s.colorPct = Math.min(1, s.colorPct + 0.08);
                    const angle = Math.atan2(dy, dx);
                    const force = (mouseRadius - dist) / mouseRadius;
                    s.vx -= Math.cos(angle) * force * 1.8;
                    s.vy -= Math.sin(angle) * force * 1.8;
                } else {
                    s.colorPct = Math.max(0, s.colorPct - 0.03);
                }

                s.offsetX += s.vx;
                s.offsetY += s.vy;
                s.vx *= 0.9;
                s.vy *= 0.9;
                s.offsetX *= 0.9;
                s.offsetY *= 0.9;

                // Gold Fade Logic
                const r = Math.floor(243 * s.colorPct);
                const g = Math.floor(164 * s.colorPct);
                const op = (Math.sin(blinkFactor + s.blinkOffset) + 1) / 2;

                ctx.beginPath();
                ctx.arc(curX, curY, s.size, 0, Math.PI * 2);
                ctx.fillStyle = "rgba(" + r + "," + g + ",0," + op + ")";
                ctx.fill();
            });

            requestAnimationFrame(animate);
        }

        requestAnimationFrame(animate);
    })();
</script>
