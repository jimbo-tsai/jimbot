<link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@400&display=swap" rel="stylesheet">

<style>
    /* Base style for the growth effect */
    .header-grow {
        transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1) !important;
        display: inline-block; /* Required for transform to work perfectly */
    }

    /* Magnify on hover */
    .header-grow:hover {
        transform: scale(1.08) !important;
    }
</style>

<header id="paige-header" class="container-fluid py-3">
    <div class="d-flex align-items-center justify-content-between">

        <div style="flex: 1; text-align: left;">
            <a class="navbar-brand header-grow" 
               href="{{ .Site.BaseURL }}" 
               style="font-family: 'Lexend Deca', sans-serif; font-weight: 700; font-size: 1.4rem; letter-spacing: 0.05rem; color: #000; text-decoration: none; line-height: 1;">
                JIMMY TSAI
            </a>
        </div>

        <div style="flex: 0 1 auto;">
            {{ partial "paige/menu.html" . }}
        </div>
        
        <div style="flex: 1; text-align: right;">
            <div class="d-flex justify-content-end gap-3">
                <a href="https://www.youtube.com/channel/UCQulP0uyasw93322XVnpvZQ" 
                   target="_blank" 
                   rel="noopener noreferrer"
                   class="header-grow"
                   style="color: #000; text-decoration: none;">
                    <i class="bi bi-youtube" style="font-size: 1.5rem;"></i>
                </a>
                <a href="https://www.instagram.com/jimbot.tsai" 
                   target="_blank" 
                   rel="noopener noreferrer"
                   class="header-grow"
                   style="color: #000; text-decoration: none;">
                    <i class="bi bi-instagram" style="font-size: 1.5rem;"></i>
                </a>
            </div>
        </div>

    </div>
</header>

{{ partial "paige/star-effect.html" . }}
