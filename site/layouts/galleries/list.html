{{ define "main" }}
<style>
  /* 1. Initial State for Waterfall */
  .jimmy-card-wrapper {
    opacity: 0;
    transform: translateY(15px);
    transition: opacity 0.8s ease-out, transform 0.8s cubic-bezier(0.25, 1, 0.5, 1);
  }

  /* 2. Revealed State */
  .jimmy-card-wrapper.revealed {
    opacity: 1;
    transform: translateY(0);
  }

  .jimmy-card-container {
    overflow: hidden;
    position: relative;
    height: 300px;
    display: block;
    border-radius: 1rem; /* Rounded corners */
  }

  .jimmy-zoom-img {
    transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1) !important;
    object-fit: cover;
    display: block;
    width: 100%;
    height: 100%;
  }

  /* Magnify effect on hover */
  .jimmy-card-container:hover .jimmy-zoom-img {
    transform: scale(1.1) !important;
  }

  .jimmy-overlay {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    padding: 1.5rem 1rem;
    text-align: center;
    background: linear-gradient(transparent, rgba(0,0,0,0.85));
    pointer-events: none;
    z-index: 2;
  }
</style>

<div class="row row-cols-1 row-cols-md-3 g-4 justify-content-center" id="collections-grid">
  {{- range .Pages }}
  <div class="col jimmy-card-wrapper">
    <div class="jimmy-card-container">
      <a href="{{ .RelPermalink }}" class="text-decoration-none">
        {{- $dirName := path.Base .File.Dir }}
        
        <img src="{{ printf "galleries/%s.jpg" $dirName | relURL }}" 
             class="jimmy-zoom-img" 
             alt="{{ .Title }}">

        <div class="jimmy-overlay">
          <h5 class="text-white fw-bold mb-0 text-uppercase" 
              style="font-family: 'Lexend Deca', sans-serif; letter-spacing: 1px;">
              {{ .Title }}
          </h5>
        </div>
      </a>
    </div>
  </div>
  {{- end }}
</div>

<script>
(function() {
    function initCollectionsWaterfall() {
        const grid = document.getElementById('collections-grid');
        if (!grid) return;

        const cards = grid.querySelectorAll('.jimmy-card-wrapper');
        
        cards.forEach((card, index) => {
            const img = card.querySelector('img');
            
            const triggerFade = () => {
                // Waterfall timing: 200ms start + 120ms per additional card
                const delay = 80 + (index * 80);
                setTimeout(() => {
                    card.classList.add('revealed');
                }, delay);
            };

            if (img && img.complete) {
                triggerFade();
            } else if (img) {
                img.addEventListener('load', triggerFade);
                img.addEventListener('error', triggerFade);
            } else {
                triggerFade();
            }
        });
    }

    document.addEventListener("DOMContentLoaded", initCollectionsWaterfall);
})();
</script>
{{ end }}
